  </text>
  <text x="20" y="416" font-size="13">
    <tspan fill="#3fb950">  ★  </tspan><tspan fill="#c9d1d9">Clean separation of concerns across modules</tspan>
  </text>
  <text x="20" y="433" font-size="13">
    <tspan fill="#3fb950">  ★  </tspan><tspan fill="#c9d1d9">Comprehensive TypeScript types with no any casts</tspan>
